# AWS Distro for OpenTelemetry (ADOT) collector — BossMind Resumora
# Receives OTLP over HTTP on port 4318; exports traces to X-Ray and metrics to CloudWatch EMF.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 256

exporters:
  awsxray:
    region: us-east-1
  awsemf:
    region: us-east-1
    namespace: BossMind/Resumora
    log_group_name: /bossmind/resumora/otel-metrics
    dimension_rollup_option: NoDimensionRollup

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [awsxray]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [awsemf]
