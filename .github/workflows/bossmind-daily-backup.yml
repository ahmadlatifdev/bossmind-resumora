name: BossMind daily preservation backup

on:
  schedule:
    # 06:15 UTC daily — adjust for your ops window
    - cron: "15 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: bossmind-backup-${{ github.repository }}
  cancel-in-progress: false

jobs:
  preservation-backup:
    name: Verified rolling backup + validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Multi-project verified backup (anchor-only on GitHub-hosted runner)
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          BOSSMIND_PROJECT_KEY: ${{ vars.BOSSMIND_PROJECT_KEY }}
          BOSSMIND_BOSSMIND_ROOT: ${{ secrets.BOSSMIND_BOSSMIND_ROOT }}
        run: npm run bossmind:backup:multi

      - name: Read-only preservation validate
        run: npm run bossmind:preservation:validate

      - name: Restore simulation (no writes)
        run: npm run bossmind:backup:simulate

      - name: Production backup coverage report
        env:
          BOSSMIND_BOSSMIND_ROOT: ${{ secrets.BOSSMIND_BOSSMIND_ROOT }}
        run: npm run bossmind:backup:production-report

      - name: Recovery suggest (dry report)
        run: npm run bossmind:recovery:suggest
