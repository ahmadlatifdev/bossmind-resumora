name: Hosting Policy Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-hosting-policy:
    name: Validate hosting policy (no Vercel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fail fast on disallowed hosting references
        run: npm run validate:hosting

  validate-bossmind:
    name: BossMind validation (after hosting guard)
    runs-on: ubuntu-latest
    needs:
      - validate-hosting-policy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run BossMind validation pipeline
        env:
          BOSSMIND_SKIP_ANTILEAK: "1"
        run: npm run bossmind:validate
